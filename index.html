<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CRT Attendance Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f6f8fb;
    --bg-grad:radial-gradient(1200px 600px at 10% -10%, #e0e7ff 0%, transparent 60%),
              radial-gradient(900px 500px at 100% 0%, #dcfce7 0%, transparent 55%),
              linear-gradient(180deg,#f6f8fb 0%, #eef2f7 100%);
    --card:#ffffff;
    --border:#e5e9f0;
    --text:#0b1220;
    --muted:#64748b;
    --primary:#2563eb;
    --primary-dark:#1d4ed8;
    --green:#16a34a;
    --green-soft:#ecfdf5;
    --red:#dc2626;
    --red-soft:#fef2f2;
    --blue-soft:#eff6ff;
    --amber:#d97706;
    --amber-soft:#fffbeb;
    --teal:#0f766e;
    --shadow-sm:0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06);
    --shadow-md:0 4px 14px rgba(15,23,42,.06), 0 2px 6px rgba(15,23,42,.04);
    --shadow-lg:0 20px 40px -20px rgba(37,99,235,.25), 0 10px 20px -10px rgba(15,23,42,.1);
    --radius:18px;
  }

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  }

  html,body{
    height:100%;
  }

  body{
    background:var(--bg);
    background-image:var(--bg-grad);
    min-height:100vh;
    color:var(--text);
    padding:24px 16px 48px;
    -webkit-font-smoothing:antialiased;
  }

  .container{
    max-width:1240px;
    margin:auto;
  }

  .title{
    text-align:center;
    margin:8px 0 28px;
  }

  .badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:6px 14px;
    border-radius:999px;
    background:rgba(37,99,235,.08);
    color:var(--primary);
    font-weight:600;
    font-size:13px;
    letter-spacing:.3px;
    border:1px solid rgba(37,99,235,.15);
    margin-bottom:14px;
  }

  .badge::before{
    content:"";
    width:7px;
    height:7px;
    border-radius:50%;
    background:var(--primary);
    box-shadow:0 0 0 4px rgba(37,99,235,.15);
  }

  .title h1{
    font-size:clamp(28px,4.2vw,44px);
    font-weight:800;
    letter-spacing:-1px;
    background:linear-gradient(90deg,#0b1220,#2563eb);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .title p{
    margin-top:8px;
    font-size:16px;
    color:var(--muted);
    font-weight:500;
  }

  .card{
    background:var(--card);
    padding:22px;
    border-radius:var(--radius);
    box-shadow:var(--shadow-md);
    border:1px solid var(--border);
    margin-bottom:20px;
  }

  .input-wrap{
    position:relative;
  }

  .input-wrap svg{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    width:22px;
    height:22px;
    color:var(--muted);
    pointer-events:none;
  }

  input{
    width:100%;
    padding:18px 18px 18px 52px;
    font-size:18px;
    font-weight:500;
    border:2px solid var(--border);
    border-radius:14px;
    outline:none;
    background:#fafbfd;
    transition:all .2s ease;
    color:var(--text);
    letter-spacing:.5px;
  }

  input::placeholder{
    color:#94a3b8;
    font-weight:500;
    letter-spacing:.3px;
  }

  input:focus{
    outline:none !important;
    box-shadow:none !important;
    border-color:var(--border);
  }

  .clear-btn{
    margin-top:14px;
    padding:12px 22px;
    background:#fff;
    color:var(--red);
    border:1.5px solid var(--red);
    border-radius:12px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    display:none;
    transition:.2s;
  }

  .clear-btn:hover{
    background:var(--red);
    color:#fff;
  }

  #error{
    margin-top:14px;
    padding:12px 16px;
    background:var(--red-soft);
    color:var(--red);
    border:1px solid #fecaca;
    border-radius:12px;
    font-size:15px;
    font-weight:600;
    display:none;
  }

  .date-notice{
    display:none;
    align-items:center;
    gap:12px;
    padding:14px 18px;
    background:var(--amber-soft);
    color:var(--amber);
    border:1.5px solid #fde68a;
    border-radius:14px;
    font-size:14px;
    font-weight:600;
    line-height:1.5;
    margin-bottom:16px;
    animation:fadeIn .3s ease;
  }

  .date-notice.visible{
    display:flex;
  }

  .date-notice svg{
    width:22px;
    height:22px;
    flex-shrink:0;
    color:var(--amber);
  }

  #result{
    display:none;
    animation:fadeIn .4s ease;
  }

  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(6px); }
    to{ opacity:1; transform:none; }
  }

  .student-card{
    background:linear-gradient(135deg,#ffffff 0%,#f8fafc 100%);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:22px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
  }

  .student-left{
    display:flex;
    align-items:center;
    gap:18px;
    flex-wrap:wrap;
  }

  .avatar{
    width:64px;
    height:64px;
    border-radius:50%;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:700;
    color:#fff;
    box-shadow:0 8px 20px rgba(37,99,235,.3);
    letter-spacing:.5px;
    flex-shrink:0;
  }

  .student-info-wrapper{
    flex:1;
    min-width:200px;
  }

  .student-name{
    font-size:20px;
    font-weight:700;
    color:var(--text);
    margin-bottom:4px;
    letter-spacing:-.2px;
  }

  .student-details{
    font-size:14px;
    color:var(--muted);
    font-weight:500;
    line-height:1.6;
  }

  .student-details .chip{
    display:inline-block;
    padding:2px 10px;
    border-radius:999px;
    background:var(--blue-soft);
    color:var(--primary);
    font-weight:600;
    font-size:12px;
    margin-right:6px;
    margin-bottom:4px;
  }

  .reg-box{
    background:#0b1220;
    color:#fff;
    padding:14px 22px;
    border-radius:12px;
    font-size:16px;
    font-weight:700;
    letter-spacing:1px;
    font-family:'JetBrains Mono',ui-monospace,monospace;
    flex-shrink:0;
  }

  .summary{
    margin-top:18px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:14px;
  }

  .box{
    background:#fff;
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:24px 18px;
    text-align:center;
    transition:.25s;
    box-shadow:var(--shadow-sm);
    position:relative;
    overflow:hidden;
  }

  .box::before{
    content:"";
    position:absolute;
    inset:0 0 auto 0;
    height:3px;
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    opacity:0;
    transition:.25s;
  }

  .box:hover{
    transform:translateY(-3px);
    box-shadow:var(--shadow-md);
  }

  .box:hover::before{
    opacity:1;
  }

  .num{
    font-size:44px;
    font-weight:800;
    line-height:1;
    letter-spacing:-1.5px;
    margin-bottom:10px;
  }

  .green{ color:var(--green); }
  .red{ color:var(--red); }
  .blue{ color:var(--primary); }

  .label{
    font-size:14px;
    font-weight:600;
    color:var(--muted);
    letter-spacing:.3px;
    text-transform:uppercase;
  }

  .date-picker-wrap{
    margin:24px 0;
    position:relative;
    display:inline-block;
  }

  .date-toggle{
    padding:14px 22px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:14px;
    box-shadow:var(--shadow-lg);
    transition:.2s;
    min-width:240px;
    justify-content:space-between;
  }

  .date-toggle:hover{
    transform:translateY(-1px);
  }

  .date-toggle .arrow{
    display:inline-block;
    width:0;
    height:0;
    border-top:6px solid transparent;
    border-bottom:6px solid transparent;
    border-left:7px solid #fff;
    transition:transform .25s;
    flex-shrink:0;
  }

  .date-picker-wrap.open .date-toggle .arrow{
    transform:rotate(90deg);
  }

  .date-dropdown{
    position:absolute;
    top:0;
    left:100%;
    margin-left:10px;
    min-width:200px;
    background:#fff;
    border:1px solid var(--border);
    border-radius:14px;
    padding:6px;
    display:none;
    flex-direction:column;
    gap:2px;
    box-shadow:0 20px 40px rgba(15,23,42,.12);
    z-index:100;
    max-height:340px;
    overflow-y:auto;
  }

  .date-picker-wrap.open .date-dropdown{
    display:flex;
  }

  .date-item{
    padding:12px 14px;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
    transition:.15s;
    color:var(--text);
    white-space:nowrap;
  }

  .date-item:hover,
  .date-item.active{
    background:var(--blue-soft);
    color:var(--primary);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:12px;
    margin-top:20px;
  }

  .slot{
    padding:20px 16px;
    border-radius:14px;
    text-align:center;
    border:1.5px solid;
    transition:.2s;
  }

  .slot:hover{
    transform:translateY(-2px);
    box-shadow:var(--shadow-sm);
  }

  .present{ background:var(--green-soft); border-color:#86efac; }
  .absent{ background:var(--red-soft); border-color:#fca5a5; }

  .time{
    font-size:13px;
    color:var(--muted);
    margin-bottom:10px;
    font-weight:600;
    letter-spacing:.3px;
  }

  .status{
    font-size:36px;
    font-weight:800;
    margin-bottom:6px;
    letter-spacing:-1px;
  }

  .present .status{ color:var(--green); }
  .absent .status{ color:var(--red); }

  .word{
    font-size:14px;
    font-weight:700;
    color:var(--text);
    text-transform:uppercase;
    letter-spacing:.5px;
  }

  /* ── Anti-Inspect Overlay ── */
  #devtools-blocker{
    display:none;
    position:fixed;
    inset:0;
    z-index:999999;
    background:#000;
    cursor:default;
  }

  #devtools-blocker img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
    pointer-events:none;
    user-select:none;
    -webkit-user-drag:none;
  }

  /* ===== TABLET ===== */
  @media (max-width:1024px){
    body{ padding:20px 14px 48px; }
    .title h1{ font-size:36px; }
    .card{ padding:18px; margin-bottom:18px; }
    input{ padding:16px 16px 16px 50px; font-size:16px; }
    .input-wrap svg{ width:20px; height:20px; left:16px; }
    .clear-btn{ padding:12px 18px; font-size:14px; }
    .student-card{ flex-direction:row; gap:16px; }
    .student-left{ flex:1; }
    .avatar{ width:56px; height:56px; font-size:20px; }
    .student-name{ font-size:18px; }
    .reg-box{ padding:12px 18px; font-size:14px; }
    .summary{ grid-template-columns:repeat(3,1fr); gap:12px; }
    .box{ padding:20px 14px; }
    .num{ font-size:40px; }
    .label{ font-size:13px; }
    .date-picker-wrap{ margin:20px 0; }
    .date-toggle{ padding:13px 18px; font-size:15px; gap:10px; min-width:220px; }
    .grid{ grid-template-columns:repeat(4,1fr); gap:10px; }
    .slot{ padding:18px 14px; }
    .time{ font-size:12px; }
    .status{ font-size:32px; }
    .date-notice{ font-size:13px; padding:12px 14px; }
  }

  /* ===== MOBILE ===== */
  @media (max-width:768px){
    body{ padding:16px 12px 48px; }
    .title h1{ font-size:32px; }
    .title p{ font-size:14px; }
    .card{ padding:16px; margin-bottom:16px; }
    input{ padding:16px 16px 16px 48px; font-size:16px; border-radius:12px; }
    .input-wrap svg{ width:20px; height:20px; left:14px; }
    .clear-btn{ width:100%; padding:12px 16px; margin-top:12px; font-size:14px; border-radius:10px; }
    #error{ margin-top:10px; padding:10px 12px; font-size:13px; border-radius:10px; }

    .student-card{ flex-direction:column; align-items:flex-start; gap:12px; padding:14px; }
    .student-left{ width:100%; flex-direction:row; gap:14px; }
    .student-info-wrapper{ flex:1; width:100%; }
    .student-details .chip{ display:block; margin:3px 0; padding:3px 8px; font-size:11px; }
    .avatar{ width:52px; height:52px; font-size:18px; flex-shrink:0; }
    .student-name{ font-size:17px; margin-bottom:3px; }
    .student-details{ font-size:13px; line-height:1.5; }
    .reg-box{ width:100%; text-align:center; padding:12px 14px; font-size:13px; letter-spacing:.5px; margin-top:4px; }

    .summary{ grid-template-columns:repeat(2,1fr); gap:12px; margin-top:12px; }
    .box{ padding:16px 12px; border-radius:12px; }
    .num{ font-size:32px; margin-bottom:6px; }
    .label{ font-size:12px; letter-spacing:0; }

    .date-picker-wrap{
      margin:16px 0;
      width:100%;
      position:static;
      display:block;
    }

    .date-toggle{
      width:100%;
      padding:14px 16px;
      font-size:15px;
      gap:10px;
      border-radius:12px;
      min-width:unset;
      justify-content:space-between;
    }

    .date-toggle .arrow{
      border-top:5px solid transparent;
      border-bottom:5px solid transparent;
      border-left:6px solid #fff;
    }

    .date-dropdown{
      position:static;
      margin-left:0;
      margin-top:10px;
      display:none;
      flex-direction:row;
      flex-wrap:wrap;
      gap:8px;
      padding:14px;
      border-radius:14px;
      background:#fff;
      border:1px solid var(--border);
      box-shadow:var(--shadow-md);
      max-height:none;
      overflow:visible;
    }

    .date-picker-wrap.open .date-dropdown{
      display:flex;
    }

    .date-item{
      padding:9px 16px;
      border-radius:999px;
      font-size:13px;
      font-weight:600;
      background:#f1f5f9;
      color:var(--text);
      border:1.5px solid transparent;
      flex:0 0 auto;
      transition:.15s;
      white-space:nowrap;
    }

    .date-item:hover{
      background:var(--blue-soft);
      color:var(--primary);
      border-color:rgba(37,99,235,.2);
    }

    .date-item.active{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }

    .grid{ grid-template-columns:repeat(2,1fr); gap:10px; margin-top:12px; }
    .slot{ padding:16px 12px; border-radius:12px; border-width:1.2px; }
    .time{ font-size:11px; margin-bottom:6px; }
    .status{ font-size:30px; margin-bottom:4px; }
    .word{ font-size:12px; }

    .date-notice{ font-size:13px; padding:12px 14px; gap:10px; border-radius:12px; }
    .date-notice svg{ width:20px; height:20px; }
  }

  /* ===== SMALL MOBILE ===== */
  @media (max-width:480px){
    body{ padding:12px 10px 40px; }
    .container{ max-width:100%; }
    .title{ margin:0 0 20px; }
    .title h1{ font-size:28px; letter-spacing:-.5px; }
    .title p{ font-size:13px; margin-top:6px; }
    .card{ padding:14px; margin-bottom:12px; }
    input{ padding:14px 14px 14px 44px; font-size:15px; border-radius:11px; }
    .input-wrap svg{ width:18px; height:18px; left:12px; }
    #error{ margin-top:10px; padding:10px 12px; font-size:13px; border-radius:10px; }
    .clear-btn{ width:100%; padding:10px 12px; font-size:13px; border-radius:10px; margin-top:10px; }

    .student-card{ padding:12px; gap:10px; }
    .student-left{ gap:12px; }
    .avatar{ width:48px; height:48px; font-size:17px; }
    .student-name{ font-size:16px; margin-bottom:2px; }
    .student-details{ font-size:12px; line-height:1.4; }
    .student-details .chip{ padding:2px 7px; font-size:10px; margin:2px 0; }
    .reg-box{ width:100%; padding:10px 12px; font-size:12px; letter-spacing:.3px; }

    .summary{ grid-template-columns:repeat(2,1fr); gap:10px; margin-top:10px; }
    .box{ padding:12px 8px; border-radius:10px; }
    .num{ font-size:26px; margin-bottom:4px; }
    .label{ font-size:10px; letter-spacing:0; }

    .date-picker-wrap{ margin:12px 0; width:100%; }
    .date-toggle{ width:100%; padding:12px 14px; font-size:14px; gap:8px; border-radius:11px; min-width:unset; }
    .date-toggle .arrow{ border-top:4px solid transparent; border-bottom:4px solid transparent; border-left:5px solid #fff; }

    .date-dropdown{ padding:10px; gap:6px; border-radius:12px; margin-top:8px; }
    .date-item{ padding:8px 13px; font-size:12px; border-radius:999px; }

    .grid{ grid-template-columns:repeat(2,1fr); gap:8px; margin-top:10px; }
    .slot{ padding:12px 10px; border-radius:10px; border-width:1px; }
    .time{ font-size:10px; margin-bottom:5px; }
    .status{ font-size:26px; margin-bottom:2px; }
    .word{ font-size:10px; }

    .date-notice{ font-size:12px; padding:10px 12px; gap:8px; border-radius:10px; }
    .date-notice svg{ width:18px; height:18px; }
  }
</style>
</head>
<body>

  <!-- Anti-Inspect Fullscreen Overlay -->
  <div id="devtools-blocker">
    <img src="https://pbs.twimg.com/media/G3pBT_PXkAAyVDC.jpg" alt="" draggable="false" />
  </div>

  <div class="container" id="mainContent">
    <div class="title">
      <h1>CRT Attendance Portal</h1>
      <p id="dateRangeText"></p>
    </div>

    <div class="card">
      <div class="input-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="tel" id="regInput" placeholder="Enter your Registration Number" maxlength="10" />
      </div>
      <button class="clear-btn" id="clearBtn" onclick="clearData()">Clear</button>
      <div id="error">⚠ Student Not Found — please check your registration number.</div>
    </div>

    <div id="result">
      <div class="card">
        <div id="studentInfo"></div>
        <div id="summary" class="summary"></div>

        <div class="date-picker-wrap" id="datePickerWrap">
          <button type="button" class="date-toggle" onclick="toggleDatePicker(event)" aria-haspopup="true" aria-expanded="false">
            <span id="selectedDate">23.05.2026</span>
            <span class="arrow"></span>
          </button>
          <div class="date-dropdown" id="dateDropdown"></div>
        </div>

        <div class="date-notice" id="dateNotice">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <span id="dateNoticeText"></span>
        </div>

        <div id="attendanceGrid" class="grid"></div>
      </div>
    </div>
  </div>

<script>
  // ══════════════════════════════════════════════════════
  //  ANTI-INSPECT / DEVTOOLS PROTECTION
  // ══════════════════════════════════════════════════════
  (function () {
    var blocker = document.getElementById('devtools-blocker');

    function showBlocker() {
      blocker.style.display = 'block';
    }

    function hideBlocker() {
      blocker.style.display = 'none';
    }

    // ── 1. Block right-click context menu ──────────────

    // ── 2. Block keyboard shortcuts ────────────────────
    document.addEventListener('keydown', function (e) {
      var key = e.key || e.keyCode;

      // F12
      if (e.keyCode === 123) {
        e.preventDefault();
        showBlocker();
        return;
      }

      // Ctrl+Shift+I / Cmd+Opt+I  (Inspector)
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
        e.preventDefault();
        showBlocker();
        return;
      }

      // Ctrl+Shift+J / Cmd+Opt+J  (Console)
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'J' || e.key === 'j')) {
        e.preventDefault();
        showBlocker();
        return;
      }

      // Ctrl+Shift+C / Cmd+Opt+C  (Element picker)
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
        e.preventDefault();
        showBlocker();
        return;
      }

      // Ctrl+U  (View Source)
      if ((e.ctrlKey || e.metaKey) && (e.key === 'u' || e.key === 'U')) {
        e.preventDefault();
        showBlocker();
        return;
      }

      // Ctrl+S  (Save page)
      if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
        e.preventDefault();
        return;
      }

      // Ctrl+A  (Select all)
      if ((e.ctrlKey || e.metaKey) && (e.key === 'a' || e.key === 'A')) {
        e.preventDefault();
        return;
      }
    });

    // ── 3. DevTools open detection via window size diff ─
    var devtoolsThreshold = 160;
    var devtoolsOpen = false;

    function checkDevTools() {
      var widthDiff  = window.outerWidth  - window.innerWidth;
      var heightDiff = window.outerHeight - window.innerHeight;

      if (widthDiff > devtoolsThreshold || heightDiff > devtoolsThreshold) {
        if (!devtoolsOpen) {
          devtoolsOpen = true;
          showBlocker();
        }
      } else {
        if (devtoolsOpen) {
          devtoolsOpen = false;
          hideBlocker();
        }
      }
    }

    setInterval(checkDevTools, 500);

    // ── 4. Debugger trap (slows automated inspection) ──
    var devtoolsDetect = new Image();
    Object.defineProperty(devtoolsDetect, 'id', {
      get: function () {
        showBlocker();
        return '';
      }
    });

  })();
  // ══════════════════════════════════════════════════════


  // ── State ──────────────────────────────────────────────────────────────────
  let allData     = {};
  let currentReg  = "";
  let currentDate = "";

  function generateDateRange(startStr, endStr) {
    function parse(s) {
      const [d, m, y] = s.split(".").map(Number);
      return new Date(y, m - 1, d, 12);
    }
    const start  = parse(startStr);
    const end    = parse(endStr);
    const result = [];
    for (let dt = new Date(start); dt <= end; dt.setDate(dt.getDate() + 1)) {
      const dd   = String(dt.getDate()).padStart(2, "0");
      const mm   = String(dt.getMonth() + 1).padStart(2, "0");
      const yyyy = dt.getFullYear();
      result.push(`${dd}.${mm}.${yyyy}`);
    }
    return result;
  }

  const ALL_POSSIBLE_DATES = generateDateRange("11.05.2026", "04.07.2026");

  function updateDateRange() {
    const availableDates = Object.keys(allData);

    if (availableDates.length > 0) {
      const firstDate = availableDates[0];
      const lastDate = availableDates[availableDates.length - 1];

      document.getElementById("dateRangeText").innerText =
        `${firstDate} — ${lastDate}`;
    }
  }

  function probeDate(dateStr) {
    const url =
      `https://raw.githubusercontent.com/studentsofklu/crt-attendances/main/` +
      `Y23%20CRT%20Attendance%20(${dateStr}).json`;
    return fetch(url)
      .then(r => {
        if (!r.ok) return null;
        return r.json();
      })
      .catch(() => null);
  }

  Promise.all(ALL_POSSIBLE_DATES.map(d => probeDate(d)))
    .then(results => {
      ALL_POSSIBLE_DATES.forEach((dateStr, i) => {
        if (results[i] !== null) {
          allData[dateStr] = results[i].slice(2);
        }
      });

      updateDateRange();
    });

  document.getElementById("regInput").addEventListener("input", function () {
    const regNo = this.value.trim();
    if (regNo.length === 10) {
      searchStudent();
    } else {
      document.getElementById("result").style.display    = "none";
      document.getElementById("error").style.display     = "none";
      document.getElementById("clearBtn").style.display  = "none";
    }
  });

  function clearData() {
    document.getElementById("regInput").value           = "";
    document.getElementById("result").style.display     = "none";
    document.getElementById("error").style.display      = "none";
    document.getElementById("clearBtn").style.display   = "none";
    document.getElementById("regInput").focus();
  }

  function searchStudent() {
    const regNo = document.getElementById("regInput").value.trim();
    let student = null;

    Object.keys(allData).forEach(date => {
      const found = allData[date].find(item => item["__EMPTY_6"] == regNo);
      if (found) student = found;
    });

    if (!student) {
      document.getElementById("error").style.display    = "block";
      document.getElementById("result").style.display   = "none";
      document.getElementById("clearBtn").style.display = "inline-block";
      return;
    }

    document.getElementById("error").style.display    = "none";
    document.getElementById("result").style.display   = "block";
    document.getElementById("clearBtn").style.display = "inline-block";

    currentReg = regNo;

    const latestDate = Object.keys(allData).pop();
    currentDate = latestDate;
    document.getElementById("selectedDate").innerText = latestDate;

    buildDateItems(regNo);
    showAttendance(latestDate, regNo);

    document.getElementById("regInput").blur();
  }

  function buildDateItems(regNo) {
    let html = "";
    Object.keys(allData).forEach(date => {
      html +=
        `<div class="date-item ${date === currentDate ? "active" : ""}" ` +
        `data-date="${date}" onclick="selectDate('${date}','${regNo}')">${date}</div>`;
    });
    document.getElementById("dateDropdown").innerHTML = html;
  }

  function toggleDatePicker(e) {
    if (e) e.stopPropagation();
    const wrap   = document.getElementById("datePickerWrap");
    const isOpen = wrap.classList.contains("open");
    if (isOpen) {
      closeDatePicker();
    } else {
      wrap.classList.add("open");
      if (window.innerWidth > 768) {
        setTimeout(() => document.addEventListener("click", outsideClick), 0);
      }
    }
  }

  function closeDatePicker() {
    document.getElementById("datePickerWrap").classList.remove("open");
    document.removeEventListener("click", outsideClick);
  }

  function outsideClick(e) {
    if (!e.target.closest("#datePickerWrap")) closeDatePicker();
  }

  function selectDate(date, regNo) {
    currentDate = date;
    document.getElementById("selectedDate").innerText = date;
    closeDatePicker();
    buildDateItems(regNo);
    showAttendance(date, regNo);
  }

  function setDateNotice(regNo, date, visible) {
    const notice     = document.getElementById("dateNotice");
    const noticeText = document.getElementById("dateNoticeText");
    if (visible) {
      noticeText.innerText =
        `Your ID number (${regNo}) is not found in ${date}'s data — ` +
        `all 8 slots are calculated as Absent for this date.`;
      notice.classList.add("visible");
    } else {
      notice.classList.remove("visible");
    }
  }

  function showAttendance(date, regNo) {
    const student = allData[date].find(item => item["__EMPTY_6"] == regNo);
    let html = "";

    const timings = [
      "09:20 - 10:10", "10:10 - 11:00", "11:10 - 12:00", "12:00 - 12:50",
      "01:50 - 02:40", "02:40 - 03:40", "03:50 - 04:30", "04:30 - 05:30"
    ];

    setDateNotice(regNo, date, !student);

    if (!student) {
      for (let i = 0; i < 8; i++) {
        html +=
          `<div class="slot absent">` +
            `<div class="time">${timings[i]}</div>` +
            `<div class="status">A</div>` +
            `<div class="word">Absent</div>` +
          `</div>`;
      }
    } else {
      const slots = [
        [timings[0], student["3"]],
        [timings[1], student["4"]],
        [timings[2], student["5"]],
        [timings[3], student["7"]],
        [timings[4], student["8"]],
        [timings[5], student["9"]],
        [timings[6], student["10"]],
        [timings[7], student["11"]]
      ];
      slots.forEach(([time, status]) => {
        const present = status == "P";
        html +=
          `<div class="slot ${present ? "present" : "absent"}">` +
            `<div class="time">${time}</div>` +
            `<div class="status">${status}</div>` +
            `<div class="word">${present ? "Present" : "Absent"}</div>` +
          `</div>`;
      });
    }
    document.getElementById("attendanceGrid").innerHTML = html;

    let overallPresent = 0, overallTotal = 0;
    Object.keys(allData).forEach(day => {
      const stu = allData[day].find(item => item["__EMPTY_6"] == regNo);
      if (stu) {
        ["3","4","5","7","8","9","10","11"].forEach(k => {
          if (stu[k] == "P") overallPresent++;
          overallTotal++;
        });
      } else {
        overallTotal += 8;
      }
    });

    const overallAbsent     = overallTotal - overallPresent;
    const overallPercentage = ((overallPresent / overallTotal) * 100).toFixed(0);
    const required          = Math.ceil((0.85 * overallTotal - overallPresent) / (1 - 0.85));
    const classesNeeded     = required > 0 ? required : 0;

    // BUNK LOGIC
    const bunkClasses =
      overallPercentage >= 85
        ? Math.floor(
            (overallPresent - 0.85 * overallTotal) / 0.85
          )
        : 0;

    // AFTER BUNK ATTENDANCE LOGIC
    const afterBunkAttendance =
      bunkClasses > 0
        ? (
            (overallPresent / (overallTotal + bunkClasses)) * 100
          ).toFixed(2)
        : overallPercentage;

    let infoStudent = student;
    if (!infoStudent || !infoStudent["__EMPTY"]) {
      Object.keys(allData).forEach(day => {
        const stu = allData[day].find(item => item["__EMPTY_6"] == regNo);
        if (stu && stu["__EMPTY"]) infoStudent = stu;
      });
    }

    const name = infoStudent["__EMPTY"]   || "—";
    const reg  = infoStudent["__EMPTY_6"] || regNo;

    const firstLetter = name.trim()[0]?.toUpperCase() || "A";
    const colors = {
      A:"#00bcd4", B:"#2196f3", C:"#00acc1", D:"#f44336", E:"#2ecc71",
      F:"#ff00ff", G:"#4caf50", H:"#ff4081", I:"#3f51b5", J:"#00c853",
      K:"#c0ca33", L:"#8bc34a", M:"#e91e63", N:"#1e3a8a", O:"#ff9800",
      P:"#9c27b0", Q:"#607d8b", R:"#f44336", S:"#9e9e9e", T:"#009688",
      U:"#3f51b5", V:"#673ab7", W:"#90a4ae", X:"#738276", Y:"#fdd835", Z:"#3949ab"
    };
    const avatarColor    = colors[firstLetter] || "#2563eb";
    const avatarInitials = name.split(" ").filter(Boolean).map(x => x[0]).slice(0, 2).join("").toUpperCase();

    document.getElementById("studentInfo").innerHTML =
      `<div class="student-card">
        <div class="student-left">
          <div class="avatar" style="background:${avatarColor};">${avatarInitials}</div>
          <div class="student-info-wrapper">
            <div class="student-name">${name}</div>
            <div class="student-details">
              <span class="chip">DEPT ${infoStudent["__EMPTY_2"] || "—"}</span>
              <span class="chip">Cluster ${infoStudent["__EMPTY_3"] || "—"}</span>
              <span class="chip">CRT SEC ${infoStudent["__EMPTY_4"] || "—"}</span>
              <span class="chip">CRT Room ${infoStudent["__EMPTY_5"] || "—"}</span>
            </div>
          </div>
        </div>
        <div class="reg-box">${reg}</div>
      </div>`;

    document.getElementById("summary").innerHTML =
      `<div class="box">
        <div class="num" style="color:#2563eb;">${overallTotal}</div>
        <div class="label">Total Classes</div>
      </div>
      <div class="box">
        <div class="num" style="color:#16a34a;">${overallPresent}</div>
        <div class="label">Present</div>
      </div>
      <div class="box">
        <div class="num" style="color:#dc2626;">${overallAbsent}</div>
        <div class="label">Absent</div>
      </div>
      <div class="box">
        <div class="num" style="color:#9333ea;">${overallPercentage}%</div>
        <div class="label">Attendance</div>
      </div>
      <div class="box">
        <div class="num" style="color:#f59e0b;">${classesNeeded}</div>
        <div class="label">Classes Needed for 85% Attendance</div>
      </div>
      <div class="box">
        <div class="num" style="color:#0f766e;">${bunkClasses}</div>
        <div class="label">Class Bunk</div>
        <div style="
          margin-top:8px;
          font-size:13px;
          font-weight:600;
          color:#64748b;
        ">After Bunk ${afterBunkAttendance}%</div>
      </div>`;
  }
</script>
</body>
